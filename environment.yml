name: speech-analytics
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.12
  - pytorch=2.3.1
  - torchaudio=2.3.1
  # Remove cudatoolkit line if no GPU available:
  - cudatoolkit=12.1
  - pip
  - pip:
    - librosa==0.10.2
    - soundfile==0.12.1
    - audiomentations==0.36.0
    - git+https://github.com/tyiannak/pyAudioAnalysis.git
    - scikit-learn==1.5.2
    - numpy==1.26.4
    - pandas==2.2.2
    - scipy==1.13.1
    - joblib==1.4.2
    - transformers==4.41.2
    - datasets==2.19.2
    - sentencepiece==0.2.0
    - accelerate==0.30.1
    - faster-whisper==1.0.3
    - mlflow==2.13.2
    - gradio==5.4.0
    - matplotlib==3.9.0
    - seaborn==0.13.2
    - plotly==5.22.0
    - python-dotenv==1.0.1
    - tqdm==4.66.4
    - pyyaml==6.0.1
    - click==8.1.7
