name: speech-analytics
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip

  - pip:
    # ── PyTorch (pip only — avoids conda/pip conflict) ────────────────────────
    # If NO GPU: pip will auto-select CPU build. If GPU: install manually with
    #   pip install torch==2.11.0+cu121 torchaudio==2.11.0+cu121 --index-url https://download.pytorch.org/whl/cu121
    - torch==2.11.0
    - torchaudio==2.11.0

    # ── Audio Processing ──────────────────────────────────────────────────────
    - librosa==0.11.0
    - soundfile==0.13.1
    - audiomentations==0.43.1
    # pyAudioAnalysis: install manually after env creation:
    #   pip install git+https://github.com/tyiannak/pyAudioAnalysis.git

    # ── Classical ML ──────────────────────────────────────────────────────────
    - scikit-learn==1.8.0
    - numpy==2.4.4
    - pandas==2.2.3
    - scipy==1.17.1
    - joblib==1.5.3

    # ── Deep Learning / NLP ───────────────────────────────────────────────────
    - transformers==5.5.0
    - datasets==4.8.4
    - sentencepiece==0.2.1
    - accelerate==1.13.0

    # ── ASR ───────────────────────────────────────────────────────────────────
    - faster-whisper==1.2.1

    # ── Experiment Tracking ───────────────────────────────────────────────────
    - mlflow==3.11.1

    # ── UI (PINNED to 5.x — dashboard streaming API is Gradio 5.x syntax) ────
    # DO NOT upgrade to 6.x — stream_every parameter moved to gr.Audio() in 6.x
    - gradio==5.4.0

    # ── Visualisation ─────────────────────────────────────────────────────────
    - matplotlib==3.10.8
    - seaborn==0.13.2
    - plotly==6.6.0

    # ── Utilities ─────────────────────────────────────────────────────────────
    - python-dotenv==1.2.2
    - tqdm==4.67.3
    - pyyaml==6.0.3
    - click==8.3.2
